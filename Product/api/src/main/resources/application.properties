spring.application.name=api

# Configuração da URL de Conexão com o PostgreSQL
# O Spring vai tentar ler a variável do sistema. Se não achar, usa o valor padrão depois dos dois pontos (:)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configurações de Performance do Pool de Conexões (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

# Mostrar os SQLs gerados no console (útil para debugar no desenvolvimento)
logging.level.org.springframework.jdbc.core.JdbcTemplate=DEBUG